version: '3.8'

services:
  backend:
    build: ./backend
    container_name: devscope_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: devscope_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # <--- CRITICAL: This fixes the "vite: not found" error
    env_file:
      - ./frontend/.env
    depends_on:
      - backend