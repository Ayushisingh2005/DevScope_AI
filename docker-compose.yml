version: '3.8'

services:
  backend:
    build: ./backend
    container_name: devscope_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/data
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: devscope_frontend
    ports:
      - "5173:80"  # Browser mein localhost:5173 khulega
    depends_on:
      - backend
    restart: always